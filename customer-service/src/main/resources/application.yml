spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:postgresql://localhost:5433/customer_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: transaction-customer-service-jwt-secret-key-2026-very-long-and-safe
    expiration-minutes: 60

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8081
